<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faff04"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="2" y="2" width="96" height="96" rx="18" fill="none" stroke="url(#text)" stroke-width="2"/>
  <!-- E Letter -->
  <text x="50" y="68" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="url(#text)" text-anchor="middle">E</text>
</svg>