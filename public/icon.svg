<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faff04"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
  </defs>
  <!-- Circular background -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)"/>
  <!-- Circular border -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#text)" stroke-width="12"/>
  <!-- E Letter -->
  <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="280" fill="url(#text)">E</text>
</svg>